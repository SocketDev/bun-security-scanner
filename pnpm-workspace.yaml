packages:
  - .claude/hooks/fleet/*
  - .config/fleet/oxlint-plugin
  - .config/fleet/oxlint-plugin/fleet/*
autoInstallPeers: true
managePackageManagerVersions: false
pmOnFail: 'warn'
blockExoticSubdeps: true
confirmModulesPurge: false
enablePrePostScripts: true
minimumReleaseAge: 10080
resolutionMode: 'highest'
saveExact: true
trustPolicy: 'no-downgrade'
minimumReleaseAgeExclude:
  - '@sdxgen/*'
  - '@socketoverride/*'
  - '@socketregistry/*'
  - '@socketsecurity/*'
  - '@stuie/*'
  - '@ultrathink/*'
  - 'sdxgen'
  - 'sfw'
  - 'socket'
  - 'stuie'
  # published: 2026-07-16 | removable: 2026-07-23
  - 'magic-string@1.0.0'
  # published: 2026-07-16 | removable: 2026-07-23
  - 'portless@0.15.4'
  # published: 2026-07-17 | removable: 2026-07-24
  - 'markdownlint-cli2@0.23.1'
  # oxlint-tsgolint — the type-aware lint sidecar oxlint's `--type-aware` flag
  # drives; first-party oxc tooling, same trust rationale as oxlint itself.
  # Main package + per-platform binding family exact-pinned so a future
  # version re-soaks.
  # published: 2026-07-21 | removable: 2026-07-28
  - 'oxlint-tsgolint@7.0.2001'
  # published: 2026-07-21 | removable: 2026-07-28
  - '@oxlint-tsgolint/darwin-arm64@7.0.2001'
  # published: 2026-07-21 | removable: 2026-07-28
  - '@oxlint-tsgolint/darwin-x64@7.0.2001'
  # published: 2026-07-21 | removable: 2026-07-28
  - '@oxlint-tsgolint/linux-arm64@7.0.2001'
