name: CI

on:
  push:
    branches: ["*"]
    tags-ignore: ["*"]
  pull_request:
    branches: [main]
  workflow_call:
    secrets:
      SOCKET_API_KEY:
        required: false

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@22457c87c1b161cf7dde222c3e82b2b5f8d2bed2
        with:
          no-cache: true

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test
        env:
          SOCKET_API_KEY: ${{ secrets.SOCKET_API_KEY }}

      - name: Test blocking on install
        shell: bash
        run: |
          if bun add lodahs; then
            echo "ERROR: Scanner failed to block malicious package"
            exit 1
          else
            echo "SUCCESS: Scanner blocked malicious package as expected"
            exit 0
          fi
